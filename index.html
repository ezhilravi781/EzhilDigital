<!DOCTYPE html>
<html>
<head>
<title>My Gym Practice</title>

<style>
body{
font-family: Arial;
text-align:center;
background:#111;
color:white;
}

header{
padding:30px;
font-size:30px;
}

button{
padding:10px 20px;
margin:10px;
border:none;
background:red;
color:white;
cursor:pointer;
font-size:16px;
}

button:hover{
background:orange;
}

.section{
margin:40px;
}

input{
padding:10px;
margin:10px;
width:200px;
}

a{
color:yellow;
}
</style>
</head>

<body>

<header>
🏋️ My Gym Training Page
</header>

<div class="section">
<h2>Workout Buttons</h2>

<button onclick="alert('Time for Push Ups!')">Push Ups</button>

<button onclick="alert('Time for Squats!')">Squats</button>

<button onclick="alert('Time for Running!')">Running</button>

</div>

<div class="section">
<h2>Useful Gym Links</h2>

<p>
<a href="https://www.youtube.com" target="_blank">Workout Videos</a>
</p>

<p>
<a href="https://www.bodybuilding.com" target="_blank">Fitness Articles</a>
</p>

</div>

<div class="section">

<h2>Newsletter</h2>

<p>Subscribe for workout tips</p>

<form>
<input type="email" placeholder="Enter your email">
<br>
<button>Subscribe</button>
</form>

</div>

<footer>
<p>© 2026 My Gym Practice</p>
</footer>

</body>
</html>
